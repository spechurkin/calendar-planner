spring:
  datasource:
    url: jdbc:sqlite:calendar.db
    driver-class-name: org.sqlite.JDBC

  jpa:
    hibernate:
      ddl-auto: update

    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
        format_sql: true

    show-sql: true

  flyway:
    enabled: true

server:
  port: 8080